<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-101 Digital Twin</title>
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading SO-101…</div>
        </div>
    </div>

    <div id="score-display" class="panel">
        <span class="score-label">Score</span>
        <span id="score-value">0</span>
    </div>

    <div id="score-flash">+1</div>

    <div id="canvas-container"></div>

    <div id="joint-hud" class="panel">
        <div class="panel-title">Joints (rad)</div>
        <div class="hud-row"><span class="hud-label">Shoulder    [A/D]</span><span id="j-shoulder" class="hud-value">+0.000</span></div>
        <div class="hud-row"><span class="hud-label">Upper Arm   [W/S]</span><span id="j-upper"    class="hud-value">+0.000</span></div>
        <div class="hud-row"><span class="hud-label">Lower Arm   [I/K]</span><span id="j-lower"    class="hud-value">+0.000</span></div>
        <div class="hud-row"><span class="hud-label">Wrist Pitch [J/L]</span><span id="j-wpitch"   class="hud-value">+0.000</span></div>
        <div class="hud-row"><span class="hud-label">Wrist Roll  [U/O]</span><span id="j-wroll"    class="hud-value">+0.000</span></div>
        <div class="hud-row"><span class="hud-label">Jaw         [Q/E]</span><span id="j-jaw"      class="hud-value">+0.000</span></div>
        <div class="panel-divider"></div>
        <div class="hud-hint">jaw +0.60 grasp · open wider to drop</div>
    </div>

    <div id="lighting-panel" class="panel">
        <div class="panel-title">Lighting</div>
        <button class="light-btn active" data-preset="studio">Studio</button>
        <button class="light-btn" data-preset="warm">Warm</button>
        <button class="light-btn" data-preset="cold">Cold</button>
        <button class="light-btn" data-preset="dark">Dark</button>
        <div class="panel-divider"></div>
        <button class="light-btn active" id="btn-sphere">Sphere light</button>
        <div class="panel-divider"></div>
        <button class="light-btn" id="btn-reset">Reset</button>
        <div class="panel-divider"></div>
        <button class="light-btn" id="btn-live">Live</button>
        <span id="live-status">off</span>
        <div class="panel-divider"></div>
        <div class="panel-title">Sphere light</div>
        <input type="range" id="sphere-light-slider" min="0" max="4" step="0.1" value="4">
        <span id="sphere-light-value" class="hud-hint">4</span>
        <div class="panel-divider"></div>
        <div class="panel-title">Floor shininess</div>
        <input type="range" id="shininess-slider" min="1" max="300" value="10">
        <span id="shininess-value" class="hud-hint">10</span>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
